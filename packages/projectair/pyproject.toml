[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "projectair"
version = "1.3.1"
description = "Project AIR: forensic reconstruction and incident response for AI agents. Signed AgDR chains, RFC 3161 + Sigstore Rekor anchoring, causal explanation, and Auth0-verified human-in-the-loop containment."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Kevin Minn", email = "support@vindicara.io" }]
keywords = ["ai", "security", "incident-response", "forensics", "langchain", "agent", "agdr", "owasp"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "blake3>=1.0.0,<2.0",
    # cryptography floor 42.0.0 keeps the core install broadly resolvable
    # (Ed25519 signing/verification works everywhere on >=42). ML-DSA-65
    # (FIPS 204) post-quantum signing requires cryptography>=48 and is imported
    # conditionally: on <48 it raises a clear RuntimeError with upgrade
    # instructions instead of failing at import. Opt into the newer floor with
    # the [pqc] extra below.
    "cryptography>=42.0.0,<50.0",
    "pydantic>=2.7.0,<3.0",
    "typer>=0.12.0,<1.0",
    # langchain-core: floor 1.2.22 patches CVE-2026-34070 (load_prompt path traversal, HIGH)
    # and CVE-2026-26013 (image_url SSRF, LOW).
    "langchain-core>=1.2.22,<2.0",
    # fpdf2: pure-Python PDF rendering for `air trace --format pdf`. No system deps.
    "fpdf2>=2.8.0,<3.0",
    # PyYAML: parses agent registry files for ASI03/ASI10 Zero-Trust enforcement.
    # Load path uses yaml.safe_load only. JSON registries work via stdlib and do
    # not require this package at runtime.
    "pyyaml>=6.0.2,<7.0",
    # Layer 1 anchoring deps (sigstore + rfc3161-client) live in the optional
    # [anchoring] extra below: their transitive chain pulls pre-release packages
    # that strict resolvers (uv, which backs pipx) reject, so keeping them out of
    # the core makes `pip`/`pipx install projectair` resolve cleanly.
    # PyJWT[crypto]: Layer 3 step-up approval verification. Validates Auth0
    # (or any OIDC + JWKS) tokens against the tenant's published public keys.
    # The [crypto] extra pulls in cryptography for RS256/RS384/RS512 support.
    "PyJWT[crypto]>=2.8,<3.0",
    # jcs: RFC 8785 JSON Canonicalization Scheme. Layer 4 AgDR Handoff
    # canonicalizes payloads before BLAKE3 hashing so two parties hash
    # the same bytes regardless of dict ordering or whitespace.
    "jcs>=0.2.1,<1.0",
    # tomli: standard-library tomllib backport for Python 3.10. projectair.config
    # reads pyproject/TOML; tomllib was only added to the stdlib in 3.11.
    "tomli>=2.0.0; python_version < '3.11'",
]

[project.optional-dependencies]
# Layer 1 External Trust Anchor (RFC 3161 timestamps + Sigstore Rekor). Kept out
# of the core install because the sigstore chain pulls pre-release packages that
# strict resolvers (uv/pipx) reject; opt in with: pip install 'projectair[anchoring]'.
anchoring = [
    "sigstore>=3.0,<4.0",
    "rfc3161-client>=1.0,<2.0",
]
# Native WebAuthn delegation (phase 2): the "biometric never leaves the device"
# authorization path. Only needed for airsdk.delegation.webauthn and the
# reference ceremony server; the Auth0 passkey fast path needs nothing new.
webauthn = [
    "webauthn>=2.0.0,<3.0",
]
# Post-quantum signing (ML-DSA-65 / FIPS 204) needs OpenSSL 3.5, shipped in
# cryptography>=48. Opt in with: pip install 'projectair[pqc]'. Without it the
# core install stays on the broadly-resolvable cryptography>=42 floor and
# Ed25519 signing/verification works unchanged; ML-DSA operations raise a clear
# RuntimeError with this upgrade hint.
pqc = [
    "cryptography>=48.0.0,<50.0",
]
dev = [
    # dev/CI installs the anchoring extra so the Layer 1 test suite can import it.
    "projectair[anchoring]",
    "pytest>=8.3.0,<9.0",
    "pytest-cov>=5.0.0,<6.0",
    "ruff>=0.6.0,<1.0",
    "mypy>=1.11.0,<2.0",
    "types-PyYAML>=6.0.12,<7.0",
]

[project.scripts]
air = "projectair.cli:main"
# Bare `projectair` runs the demo scan and shows results (first-run friendly);
# with args it behaves like `air`.
projectair = "projectair.cli:results_main"

[project.urls]
Homepage = "https://vindicara.io"
Repository = "https://github.com/vindicara-inc/projectair"
"Bug Tracker" = "https://github.com/vindicara-inc/projectair/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/airsdk", "src/projectair"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# "." puts the package root on sys.path so cross-module test imports like
# `from tests.attestation.conftest import make_grant` resolve under a bare
# `pytest` invocation (CI), matching `python -m pytest` used locally.
pythonpath = ["src", "."]
markers = [
    "network: requires outbound network access; skipped by default. Run with `pytest -m network`.",
    "integration: requires external service credentials (e.g. AIR_AUTH0_*). Run with `pytest -m integration`.",
]
addopts = "-m 'not network and not integration'"

[tool.ruff]
target-version = "py310"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "PT", "SIM", "TCH", "RUF"]
ignore = [
    "S101",   # assert in tests is fine
    "A002",   # shadowing 'input' builtin is intentional SDK API design
    "N818",   # exception names without Error suffix are intentional public API
    "E501",   # long strings in security descriptions are intentional
    "B008",   # typer.Option()/Argument() in defaults is standard idiom, like FastAPI's Depends
    "TC001",  # keep runtime imports for first-party types; readability over optimisation
    "TC002",  # same reasoning for third-party imports used in signatures
    "TC003",  # keep runtime imports for pathlib.Path et al. Typer / pydantic resolve types at runtime.
]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
plugins = ["pydantic.mypy"]
