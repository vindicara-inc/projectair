[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "projectair-pro"
version = "0.8.0"
description = "Project AIR Pro: licensed commercial features (AIR Cloud client, premium detectors, premium reports) on top of the MIT-licensed projectair package."
readme = "README.md"
license = "LicenseRef-Vindicara-Commercial"
requires-python = ">=3.12"
authors = [{ name = "Vindicara", email = "eng@vindicara.io" }]
keywords = ["ai", "security", "incident-response", "forensics", "agdr", "owasp", "vindicara"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    # Pro extends OSS: same AgDRRecord schema, same crypto primitives, same CLI host.
    # Lockstep on the OSS surface AIR Cloud commits to receiving from.
    "projectair>=1.3.0,<2.0",
    # Mirror projectair's core cryptography floor so pip can resolve both together.
    # The license gate only needs Ed25519; ML-DSA-65 (cryptography>=48) is opt-in
    # via the [pqc] extra, identical to projectair's split.
    "cryptography>=42.0.0,<50.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0,<9.0",
    "pytest-cov>=5.0.0,<6.0",
    "ruff>=0.6.0,<1.0",
    "mypy>=1.11.0,<2.0",
    "boto3>=1.34,<2.0",
    "moto>=5.0,<6.0",
]
# S3 chain push (`push_chain_to_s3`). Pulls in boto3 only when the customer
# wants the S3 destination; webhook push works with the base install.
s3 = [
    "boto3>=1.34,<2.0",
]
# Post-quantum signing (ML-DSA-65 / FIPS 204). Mirrors projectair[pqc]; needed
# only when the deployment signs chains with ML-DSA rather than the default Ed25519.
pqc = [
    "cryptography>=48.0.0,<50.0",
]
# HL7 v2 / FHIR clinical sidecar. Optional heavy dependency; when absent the
# top-level `airsdk_pro` import degrades gracefully (the sidecar names are None)
# so the rest of the package, including the self-hosted license gate, still loads.
hl7 = [
    "fhir.resources>=7.1.0,<8.0",
]
# Self-hosted / air-gapped deployable unit. `air-server` boots the AIR Cloud
# ingest app behind uvicorn after the offline license gate passes. The engine
# package (`vindicara`, which owns `vindicara.cloud`) is installed from source in
# the deployment image, so it is not pinned here.
deploy = [
    "uvicorn[standard]>=0.30.0,<1.0",
]

[project.scripts]
# Container entrypoint for the self-hosted / air-gapped Enterprise unit.
air-server = "airsdk_pro.serve:main"

[project.urls]
Homepage = "https://vindicara.io"
"Pricing" = "https://vindicara.io/pricing"

[tool.hatch.build.targets.wheel]
packages = ["src/airsdk_pro"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "PT", "SIM", "TCH", "RUF"]
ignore = [
    "S101",
    "E501",
    "TC001",
    "TC002",
    "TC003",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
plugins = ["pydantic.mypy"]
