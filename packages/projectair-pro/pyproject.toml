[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "projectair-pro"
version = "0.3.0"
description = "Project AIR Pro: licensed commercial features (AIR Cloud client, premium detectors, premium reports) on top of the MIT-licensed projectair package."
readme = "README.md"
license = "LicenseRef-Vindicara-Commercial"
requires-python = ">=3.12"
authors = [{ name = "Vindicara", email = "eng@vindicara.io" }]
keywords = ["ai", "security", "incident-response", "forensics", "agdr", "owasp", "vindicara"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Typing :: Typed",
]
dependencies = [
    # Pro extends OSS: same AgDRRecord schema, same crypto primitives, same CLI host.
    # Lockstep on the OSS surface AIR Cloud commits to receiving from.
    "projectair>=0.7.1,<0.8",
    "cryptography>=46.0.6,<47.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0,<9.0",
    "pytest-cov>=5.0.0,<6.0",
    "ruff>=0.6.0,<1.0",
    "mypy>=1.11.0,<2.0",
]

[project.urls]
Homepage = "https://vindicara.io"
"Pricing" = "https://vindicara.io/pricing"

[tool.hatch.build.targets.wheel]
packages = ["src/airsdk_pro"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "PT", "SIM", "TCH", "RUF"]
ignore = [
    "S101",
    "E501",
    "TC001",
    "TC002",
    "TC003",
]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
plugins = ["pydantic.mypy"]
