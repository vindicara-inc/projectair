name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'packages/air-dashboard/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VINDICARA_SITE_BUCKET: ${{ vars.VINDICARA_SITE_BUCKET }}
      VINDICARA_CF_DIST_ID: ${{ vars.VINDICARA_CF_DIST_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Type check
        working-directory: site
        run: npm run check

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Install dashboard dependencies
        working-directory: packages/air-dashboard
        run: npm install

      - name: Build dashboard
        working-directory: packages/air-dashboard
        run: npm run build

      - name: Merge dashboard into site
        run: cp -r packages/air-dashboard/build/ site/build/dashboard/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync site/build/ s3://${{ env.VINDICARA_SITE_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.VINDICARA_CF_DIST_ID }} \
            --paths "/*"
