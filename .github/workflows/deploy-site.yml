name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'vindicara-site/**'
      - 'scripts/deploy-site.sh'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VINDICARA_SITE_BUCKET: ${{ vars.VINDICARA_SITE_BUCKET }}
      VINDICARA_CF_DIST_ID: ${{ vars.VINDICARA_CF_DIST_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vindicara-site/package-lock.json

      - name: Install dependencies
        working-directory: vindicara-site
        run: npm ci

      - name: Type check
        working-directory: vindicara-site
        run: npm run check

      - name: Build site
        working-directory: vindicara-site
        run: npm run build

      - name: Verify FlightDeck build
        run: test -f vindicara-site/build/flightdeck.html

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Immutable, content-hashed assets: cache forever. No --delete so a visitor
      # mid-session on the old HTML can still fetch its (old-hash) chunks.
      - name: Sync immutable assets
        run: |
          aws s3 sync vindicara-site/build/_app/ s3://${{ env.VINDICARA_SITE_BUCKET }}/_app/ \
            --cache-control "public,max-age=31536000,immutable"

      # HTML and everything else: never hard-cache; clean cutover with --delete.
      - name: Sync HTML and assets
        run: |
          aws s3 sync vindicara-site/build/ s3://${{ env.VINDICARA_SITE_BUCKET }}/ \
            --exclude "_app/*" --cache-control "no-cache" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.VINDICARA_CF_DIST_ID }} \
            --paths "/*"
