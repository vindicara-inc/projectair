name: Deploy site

# vindicara.io is a server-rendered SvelteKit app (adapter-node) running on ECS
# Fargate behind an ALB, defined by the VindicaraSiteServer CDK stack. This
# workflow builds the container image and rolls the ECS service via `cdk deploy`.
#
# It deliberately does NOT do the old static `aws s3 sync` + CloudFront deploy:
# that path published an adapter-node build as if it were a static export, so
# every /_app/* asset 404'd and the site rendered unstyled. The container build
# is the single source of truth now.

on:
  push:
    branches: [main]
    paths:
      - 'vindicara-site/**'
      - 'src/vindicara/infra/stacks/site_server_stack.py'
      - 'src/vindicara/infra/app.py'
      - 'cdk.json'
      - 'cdk.context.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - uses: actions/checkout@v4

      # Gate: type-check the site before we spend time building an image. The
      # actual production build happens inside vindicara-site/Dockerfile.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vindicara-site/package-lock.json

      - name: Install site deps
        working-directory: vindicara-site
        run: npm ci

      - name: Type check the site
        working-directory: vindicara-site
        run: npm run check

      # CDK app is Python (cdk.json -> `python3 -m vindicara.infra.app`).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CDK app dependencies
        run: pip install -e ".[cdk]"

      - name: Install AWS CDK CLI
        run: npm install -g aws-cdk@2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # The CDK app resolves the target account from CDK_DEFAULT_ACCOUNT (or
      # VINDICARA_AWS_ACCOUNT_ID). Derive it from the assumed role so no extra
      # repo variable is required.
      - name: Resolve AWS account
        run: echo "CDK_DEFAULT_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"

      # Builds vindicara-site/Dockerfile (linux/amd64, native on the runner),
      # pushes to ECR, and rolls the Fargate service. Docker is preinstalled on
      # ubuntu-latest. PUBLIC_* Auth0/API config is injected at RUNTIME by the
      # stack (container env, read via $env/dynamic/public), so no build-time
      # secrets are needed here.
      - name: Deploy SSR site to ECS (CDK)
        env:
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: cdk deploy VindicaraSiteServer --require-approval never
