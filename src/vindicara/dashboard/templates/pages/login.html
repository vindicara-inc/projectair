<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Vindicara</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #08080D; color: #EFEFEF; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .mono { font-family: SFMono-Regular, Consolas, monospace; }
    input { background: #10101A; border: 1px solid #1A1A28; color: #EFEFEF; padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; width: 100%; }
    input:focus { border-color: #60A5FA; }
    .btn-red { background: #E63946; color: #EFEFEF; padding: 10px 16px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; width: 100%; font-family: inherit; }
    .btn-red:hover { background: #d32f3c; }
    a { color: #60A5FA; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div style="width:100%;max-width:380px;padding:24px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:40px;height:40px;background:#E63946;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="#fff" fill-opacity="0.9"/><path d="M12 5L6 8.5v4.5c0 3.88 2.56 7.52 6 8.5 3.44-.98 6-4.62 6-8.5V8.5L12 5z" fill="#E63946"/></svg>
      </div>
      <div style="font-weight:600;font-size:15px;letter-spacing:0.3px;">VINDICARA</div>
      <div style="color:#9090A8;font-size:13px;margin-top:4px;">Sign in to your account</div>
    </div>

    <form action="/dashboard/api/auth/login" method="post">
      <div style="margin-bottom:12px;">
        <label style="font-size:11px;color:#444458;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Email</label>
        <input type="email" name="email" required autofocus placeholder="you@company.com">
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:11px;color:#444458;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;">Password</label>
        <input type="password" name="password" required placeholder="Min 12 characters">
      </div>
      <div id="mfa-field"></div>
      <button type="submit" class="btn-red" style="margin-bottom:16px;">Sign In</button>
    </form>

    {% if error %}
    <div style="color:#E63946;font-size:13px;margin-bottom:12px;padding:8px;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);">{{ error }}</div>
    {% endif %}

    <div style="text-align:center;font-size:13px;color:#9090A8;">
      No account? <a href="/dashboard/signup">Sign up</a>
    </div>
  </div>
</body>
</html>
